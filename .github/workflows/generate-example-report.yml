name: Generate Example Delta Report

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gitpython pandas openpyxl plotly

      - name: Generate example report (OpenClaw 7-day delta)
        run: |
          mkdir -p example_reports/latest
          python branch_delta_analyzer.py \
            --github-repo openclaw/openclaw \
            --base main \
            --compare main@{7.days.ago} \
            --output example_reports

      - name: Copy latest reports for easy access
        run: |
          # Find the most recent report files
          latest_html=$(ls -t example_reports/delta_report_*.html | head -n 1)
          latest_xlsx=$(ls -t example_reports/delta_summary_*.xlsx | head -n 1)
          cp "$latest_html" example_reports/latest/LATEST_delta_report.html
          cp "$latest_xlsx" example_reports/latest/LATEST_delta_summary.xlsx

      - name: Commit example report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update latest example report (auto-generated from OpenClaw 7-day delta)'
          file_pattern: example_reports/**
          branch: main
