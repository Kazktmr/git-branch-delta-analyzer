name: Generate Example Delta Report

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gitpython pandas openpyxl plotly

      - name: Generate example report (OpenClaw 7-day delta)
        run: |
          mkdir -p example_reports/latest
          python branch_delta_analyzer.py \
            --github-repo openclaw/openclaw \
            --base main \
            --compare main@{7.days.ago} \
            --output example_reports/latest \
            || echo "Warning: Analyzer script failed"

      - name: Rename to LATEST files
        run: |
          cd example_reports/latest
          ls -la
          if [ -f delta_report_*.html ]; then
            mv delta_report_*.html LATEST_delta_report.html
          fi
          if [ -f delta_summary_*.xlsx ]; then
            mv delta_summary_*.xlsx LATEST_delta_summary.xlsx
          fi

      - name: Commit latest example report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update latest example report (auto-generated)'
          file_pattern: example_reports/latest/**
          branch: main
          commit_user_name: github-actions
          commit_user_email: github-actions@github.com
